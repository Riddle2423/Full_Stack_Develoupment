<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Area</title>
</head>
<body>
    <header><h3>Text Area</h3></header>
    <main>
        <p>Text area is genrally used for big inputs
            <ul>
                <li>you can decide the size of text area by help of attributes "rows" and "cols"</li>
            </ul>
        </p>
        <form action="\server">
            <label for="feedback">Please provide your valuable feedback :</label>
            <textarea name="feedback" placeholder="Enter your feedback here " id="feedback" rows="5" cols="10"></textarea> 
        </form>
        <button type="submit">Submit</button>
    </main>
    <footer></footer>
</body>
</html>
