<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range in input element</title>
</head>

<body>
    <header>
        <h3>Range in input element</h3>
    </header>
    <main>
        <form action="\server">
            <label for="ip">Input the value</label>
            <input type="range" min="0" max="100" id="ip" name="Vol" step="10" value="40"><br>

            <button>Submit</button>

        </form>

        <ul>
            <li>If we add "step" attribute to range input element, then our data in input element will change in fix units. </li>
            <li>To make a value defalut for range input we use "value" attribute inside input.</li>
        </ul>
    </main>
    <footer></footer>
</body>

</html>
