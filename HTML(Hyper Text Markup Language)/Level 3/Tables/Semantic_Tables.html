<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tables</title>
</head>

<body>
    <header>
        <h3>Semantic in Tables</h3>
    </header>
    <main>
        <table border="Black">
            <caption>Shakes</caption>
            <thead>
                <tr>
                    <th>Rupees</th>
                    <th>Flavor</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>30</td>
                    <td>Oreo</td>
                </tr>
                <tr>
                    <td>50</td>
                    <td>Kitkat</td>
                </tr>
                <tr>
                    <td>60</td>
                    <td>Chocolate</td>
                </tr>
            </tbody>
            <tfoot>
                <!--Generally used when we have to sum up th colomn data or likewise -->
            </tfoot>
        </table>
    </main>
    <footer></footer>

</body>

</html>
