<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select in Input</title>
</head>

<body>
    <header></header>
    <main>
        <h3>Select tag or also k/s Dropdown</h3>

        <form action="\server">
            <label for="try">Choose any one : </label>
            <select name="Value" id="try">

                <option value="1" selected  >1</option>
                <option value="2">2</option>
                <option value="3">3</option>

            </select> <br>
            <button>Submit</button>

        </form>

        <p>If you want any opt. to become default just add "selected" attribute to <B>select tag</B>.</p>


    </main>
    <footer></footer>
</body>

</html>
